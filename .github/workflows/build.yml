name: Build

on:
  pull_request:
    branches:
      - '*'
  push:
    branches:
      - '*'

jobs:
  build:
    name: Action CI
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Verify action syntax
      uses: './'
      with:
        file_paths: './'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
